# =================================================================
# KONFIGURATION FÖR TVÄTTSTUGAN
# =================================================================
# All logik för att styra belysningen i tvättstugan.
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.fonsterbelysning_light_level
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
# Justerar automatiskt färgtemperatur och ljusstyrka för
# fönsterlampan i tvättstugan baserat på dygnsrytm.
# -----------------------------------------------------------------
adaptive_lighting:
  - name: Tvättstuga
    lights:
      - light.tvattstuga_fonster
    prefer_rgb_color: false
    transition: 45
    initial_transition: 0
    interval: 90
    min_brightness: 1
    max_brightness: 35
    sleep_brightness: 2
    take_over_control: true
    detect_non_ha_changes: false
    adapt_only_on_bare_turn_on: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
template:
  - binary_sensor:
      # =============================================================
      # FÖNSTERBELYSNING
      # =============================================================
      # Steg 1: Är det mörkt nog ute för att tända fönsterlampan?
      - name: tvattstuga_belysning_lightlevel
        unique_id: tvattstuga_belysning_lightlevel
        delay_off:
          minutes: 30
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.fonsterbelysning_light_level') | float(0)) }}

      # Steg 2: Kontrollsensor som triggar automationen
      - name: tvattstuga_belysning_automation_control
        unique_id: tvattstuga_belysning_automation_control
        state: >
          {{ is_state('binary_sensor.tvattstuga_belysning_lightlevel', 'on') }}


      # =============================================================
      # KATTLUCKA (EVENT/DEBUG)
      # =============================================================
      # Indikerar kortvarigt att kattluckan har öppnats.
      - name: tvattstuga_kattlucka
        unique_id: tvattstuga_kattlucka
        delay_off:
          seconds: 10
        state: >
          {{ is_state('binary_sensor.tvattstuga_kattlucka_oppning', 'on') }}


# =================================================================
# AUTOMATION
# =================================================================
automation:
  - alias: Tvättstuga belysning
    id: tvattstuga_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.tvattstuga_belysning_automation_control
      - trigger: homeassistant
        event: start
    actions:
      - action: "light.turn_{{ states('binary_sensor.tvattstuga_belysning_automation_control') }}"
        target:
          entity_id: light.tvattstuga_fonster