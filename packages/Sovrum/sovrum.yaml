# =================================================================
# KONFIGURATION FÖR SOVRUMMET
# =================================================================
# All logik för att styra belysningen i sovrummet.
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.sovrum_light_level
#  - input_number.sovrum_fonster_light_level
#
# OBS! Lampor styrs via Light Groups i UI:
#  - light.sovrum_styrning          <-- Allmän belysning
#  - light.sovrum_styrning_fonster  <-- Fönster/dekor
#  - light.sovrum_styrning_narvaro  <-- Närvarobelysning
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
# Justerar automatiskt färgtemperatur och ljusstyrka på lamporna i
# sovrummet baserat på dygnsrytm (solens position).
# -----------------------------------------------------------------
adaptive_lighting:
  - name: Sovrum
    lights:
      - light.sovrum_byra
      - light.sovrum_lang_byra
      - light.sovrum_sang_mikael
      - light.sovrum_sang_lina
    transition: 30
    initial_transition: 1
    interval: 90
    min_brightness: 20
    max_brightness: 90
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true

  # -------------------------------------------------------------
  # Profil: Filament/dekor
  # -------------------------------------------------------------
  - name: Sovrum belysning filament
    lights:
      - light.sovrum_fonster_entre
      - light.sovrum_fonster_gungor
    transition: 45
    initial_transition: 5
    interval: 90
    min_brightness: 1
    max_brightness: 35
    sleep_brightness: 1
    take_over_control: true
    detect_non_ha_changes: false
    adapt_only_on_bare_turn_on: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
# Dessa sensorer utgör grunden för automationerna.
# -----------------------------------------------------------------
template:
  - binary_sensor:

      # -------------------------------------------------------------
      # Steg 1: Är det mörkt nog ute för allmän belysning?
      # -------------------------------------------------------------
      - name: sovrum_belysning_lightlevel
        unique_id: sovrum_belysning_lightlevel
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.sovrum_light_level') | float(0)) }}

      # -------------------------------------------------------------
      # Steg 1: Är det mörkt nog ute för fönsterbelysning?
      # -------------------------------------------------------------
      - name: sovrum_belysning_fonster_lightlevel
        unique_id: sovrum_belysning_fonster_lightlevel
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.sovrum_fonster_light_level') | float(0)) }}

      # -------------------------------------------------------------
      # Steg 2: Kontrollsensor för allmän belysning
      # -------------------------------------------------------------
      - name: sovrum_belysning_automation_control
        unique_id: sovrum_belysning_automation_control
        state: >
          {{ is_state('binary_sensor.sovrum_belysning_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}

      # -------------------------------------------------------------
      # Steg 2: Kontrollsensor för fönsterbelysning
      # -------------------------------------------------------------
      - name: sovrum_belysning_fonster_automation_control
        unique_id: sovrum_belysning_fonster_automation_control
        state: >
          {{ is_state('binary_sensor.sovrum_belysning_fonster_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}

      # -------------------------------------------------------------
      # Steg 2: Kontrollsensor för närvarobelysning
      # -------------------------------------------------------------
      # Tänd vid närvaro i sovrum ELLER vardagsrum, men bara om det är
      # mörkt nog (samma tröskel som allmän belysning).
      #
      # OBS: binary_sensor.sovrum_presence finns sedan tidigare
      # -------------------------------------------------------------
      - name: sovrum_belysning_presence_automation_control
        unique_id: sovrum_belysning_presence_automation_control
        state: >
          {{ ( is_state('binary_sensor.sovrum_presence', 'on')
              or is_state('binary_sensor.vardagsrum_presence', 'on') )
            and is_state('binary_sensor.sovrum_belysning_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}


# =================================================================
# AUTOMATIONER
# =================================================================
automation:
  # =================================================================
  # SOVRUM – BELYSNING (STYRNING)
  # =================================================================
  # En automation som styr två belysningstyper via varsin
  # automation_control-sensor och varsin light group i UI.
  # -----------------------------------------------------------------
  - alias: Sovrum belysning
    id: sovrum_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.sovrum_belysning_automation_control
          - binary_sensor.sovrum_belysning_fonster_automation_control
          - binary_sensor.sovrum_belysning_presence_automation_control
      - trigger: homeassistant
        event: start

    actions:
      # -------------------------------------------------------------
      # DEL A: Allmän belysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.sovrum_belysning_automation_control') }}"
        target:
          entity_id: light.sovrum_styrning

      # -------------------------------------------------------------
      # DEL B: Fönsterbelysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.sovrum_belysning_fonster_automation_control') }}"
        target:
          entity_id: light.sovrum_styrning_fonster

      # -------------------------------------------------------------
      # DEL C: Närvarobelysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.sovrum_belysning_presence_automation_control') }}"
        target:
          entity_id: light.sovrum_styrning_narvaro


  # =================================================================
  # SOVRUM – SÄNG MIKAEL (KNAPP)
  # =================================================================
  # Enkeltryck: Växlar "sovdags"
  # Dubbeltryck: Växlar sänglampan
  # Långtryck: Släcker allt i sovrummet och stänger av adaptiv belysning
  # -----------------------------------------------------------------
  - alias: Sovrum Säng Mikael Knapp
    id: sovrum_sang_mikael_knapp
    triggers:
      - platform: device
        domain: mqtt
        device_id: d804ff674d445d8a0704fc6dc3634837
        type: action
        subtype: single
      - platform: device
        domain: mqtt
        device_id: d804ff674d445d8a0704fc6dc3634837
        type: action
        subtype: double
      - platform: device
        domain: mqtt
        device_id: d804ff674d445d8a0704fc6dc3634837
        type: action
        subtype: hold

    actions:
      - choose:
          # ---------------------------------------------------------
          # Enkeltryck: Växlar "sovdags"
          # ---------------------------------------------------------
          - conditions:
              - condition: template
                value_template: '{{ trigger.payload == "single" }}'
            sequence:
              - action: input_boolean.toggle
                target:
                  entity_id: input_boolean.sovdags

          # ---------------------------------------------------------
          # Dubbeltryck: Växlar sänglampan (Mikael)
          # ---------------------------------------------------------
          - conditions:
              - condition: template
                value_template: '{{ trigger.payload == "double" }}'
            sequence:
              - action: light.toggle
                target:
                  entity_id: light.sovrum_sang_mikael

          # ---------------------------------------------------------
          # Långtryck: Släcker allt + stänger av Adaptive Lighting
          # ---------------------------------------------------------
          - conditions:
              - condition: template
                value_template: '{{ trigger.payload == "hold" }}'
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.sovrum
              - action: switch.turn_off
                target:
                  # OBS: Kontrollera att denna entity finns i din installation
                  entity_id: switch.adaptive_lighting_sovrum