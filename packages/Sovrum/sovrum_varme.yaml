# =================================================================
# LOGIK FÖR VÄRMEGOLV
# =================================================================
# All logik för att styra värmegolvet i sovrummet.
# -----------------------------------------------------------------

# --- Termostat för värmegolvet ---
climate:
  - platform: generic_thermostat
    name: Sovrum värmegolv
    unique_id: sovrum_varmegolv
    cold_tolerance: 0.0
    hot_tolerance: 0.2
    precision: 0.1
    heater: switch.sovrum_varmegolv
    target_sensor: sensor.sovrum_temperature
    min_temp: 7

# --- Automationen som styr termostaten ---
automation:
  - alias: Sovrum värme
    id: sovrum_varme
    triggers:
      - trigger: state
        entity_id: binary_sensor.varmegolv_block
      - trigger: homeassistant
        event: start
    actions:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.sovrum_varmegolv
        data:
          hvac_mode: "{{ iif(states('binary_sensor.varmegolv_block') == 'on', 'off', 'heat') }}"