# =================================================================
# LOGIK FÖR BELYSNING – SNICKARBOA
# =================================================================
# All logik för att styra belysningen i snickarboa.
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.snickarboa_light_level
#
# OBS! Lampor styrs via styrgrupp i UI:
#  - light.snickarboa_styrning
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
adaptive_lighting:
  - name: Snickarboa
    lights:
      - light.snickarboa_arbetsbank
      - light.snickarboa_spotlights
    transition: 45
    initial_transition: 5
    interval: 90
    min_brightness: 1
    max_brightness: 100
    min_color_temp: 2200
    max_color_temp: 4000
    sleep_brightness: 1
    take_over_control: true
    separate_turn_on_commands: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
template:
  # =============================================================
  # DÖRRTRIGGER (KORT PULS)
  # =============================================================
  # Skapar en kort "närvaro"-puls när dörren öppnas.
  # -------------------------------------------------------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.snickarboa_dorrbrytare
        from: "off"
        to: "on"
    binary_sensor:
      - name: Snickarboa dörrtrigger
        unique_id: snickarboa_dorrtrigger
        auto_off: 30
        state: "true"

  - binary_sensor:
      # =============================================================
      # NÄRVARO
      # =============================================================
      # Steg 1: Närvaro = rörelse OR dörrtrigger
      # -------------------------------------------------------------
      - name: snickarboa_presence
        unique_id: snickarboa_presence
        device_class: motion
        delay_off:
          minutes: 5
        state: >
          {{ is_state('binary_sensor.snickarboa_hue_motion_sensor_motion', 'on')
            or is_state('binary_sensor.snickarboa_dorrtrigger', 'on') }}

      # =============================================================
      # LJUSNIVÅ (INNE) – "FÖR LJUST"
      # =============================================================
      # Steg 1: on  = för ljust (tänd inte)
      #         off = mörkt nog (OK att tända)
      # -------------------------------------------------------------
      - name: snickarboa_lightlevel
        unique_id: snickarboa_lightlevel
        device_class: light
        delay_on:
          minutes: 10
        state: >
          {{ states('sensor.snickarboa_hue_motion_sensor_light_level') | float(9999)
              > states('input_number.snickarboa_light_level') | float(0) }}

      # =============================================================
      # AUTOMATION CONTROL
      # =============================================================
      # Steg 2: Kontrollsensor som triggar tänd/släck
      # -------------------------------------------------------------
      - name: snickarboa_presence_light_automation_control
        unique_id: snickarboa_presence_light_automation_control
        state: >
          {{ is_state('binary_sensor.snickarboa_presence', 'on')
            and is_state('binary_sensor.snickarboa_lightlevel', 'off') }}


# =================================================================
# AUTOMATIONER
# =================================================================
automation:
  - alias: Snickarboa belysning
    id: snickarboa_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.snickarboa_presence_light_automation_control
      - trigger: homeassistant
        event: start
    actions:
      - action: "light.turn_{{ states('binary_sensor.snickarboa_presence_light_automation_control') }}"
        target:
          entity_id:
            - light.snickarboa_styrning