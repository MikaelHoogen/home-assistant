template:
  - sensor:


    - name: elpris_idag_q00
      unique_id: elpris_idag_q00
      state: >
            {% set arr = state_attr('sensor.elpris','today') or [] %}
            {% if arr|length in [24,96] %}
              {% if arr|length == 96 %}
                {{ arr[0] }}
              {% else %}
                {{ arr[0] }}
              {% endif %}
            {% else %}
            -
            {% endif %}
            
      attributes:
        timme: >
              {% set tib = (state_attr('sensor.electricity_price_sannesholma_2181_quarter_prices','today') or []) %}
              {% if tib|length > 0 and ('startsAt' in tib[0]) %}
                {% set s = as_datetime(tib[0]['startsAt']) %}
                {% set e = s + timedelta(minutes=15) %}
                {{ s.strftime('%H:%M') }} - {{ e.strftime('%H:%M') }}
              {% else %}
              00:00 - 00:15
              {% endif %}
              
        tibber: >
              {% set tib = (state_attr('sensor.electricity_price_sannesholma_2181_quarter_prices','today') or []) %}
              {% if tib|length > 0 and ('total' in tib[0]) %}
                {{ tib[0]['total'] | round(3) }}
              {% else %}
              -
              {% endif %}
              
        total: >
              {% set tib = (state_attr('sensor.electricity_price_sannesholma_2181_quarter_prices','today') or []) %}
              {% if tib|length > 0 and ('total' in tib[0]) %}
                {{ ( (tib[0]['total'] | float('nan')) + (states('sensor.elpris_grid') | float('nan')) ) | round(3) }}
              {% else %}
              -
              {% endif %}
              
        kommentar: >
              {% set arr = state_attr('sensor.elpris','today') or [] %}
              {% if arr|length in [24,96] %}
                {% set p = (arr[0] if arr|length == 96 else arr[0]) %}
                {% set pmax = (arr|max) %}
                {% set pmean = (arr|sum / (arr|length)) %}
                {% if p == pmax %}
                Högsta pris
                {% elif p < pmean %}
                Under medel
                {% endif %}
              {% else %}
              Pris saknas
              {% endif %}
              
        sälj: >
              {% set arr = state_attr('sensor.elpris','today') or [] %}
              {% set p = (arr[0] if arr|length == 96 else (arr[0] if arr|length == 24 else none)) %}
              {% if p is not none %}
                {{ ( (p | float('nan')) + (states('sensor.elpris_natnytta') | float(0)) ) | round(3) }}
              {% else %}
              -
              {% endif %}
              
        köp: >
              {% set tib = (state_attr('sensor.electricity_price_sannesholma_2181_quarter_prices','today') or []) %}
              {% if tib|length > 0 and ('total' in tib[0]) %}
                {{ (
                  (tib[0]['total'] | float('nan'))
                  + (states('sensor.avgift_elnat') | float('nan') / 100)
                  + (states('sensor.avgift_energiskatt') | float('nan') / 100)
                ) | round(3) }}
              {% else %}
              -
              {% endif %}

