###############################################################################
# ELPRIS - KVARTSTABELL IDAG + IMORGON
#
# Skapar:
#   sensor.elpris_idag_kvartstabell
#   sensor.elpris_imorgon_kvartstabell
#
# Datakälla för kvartsvärden:
#   sensor.sannesholma_2181_diagramdataexport
#
# Spotpris:
#   sensor.elpris
#     attributes.today
#     attributes.tomorrow
#
# Avgifter:
#   sensor.avgift_elnat
#   sensor.avgift_energiskatt
###############################################################################

template:
  - sensor:
      - name: Elpris idag kvartstabell
        unique_id: elpris_idag_kvartstabell
        icon: mdi:table-clock
        state: >
          {% set data = state_attr('sensor.sannesholma_2181_diagramdataexport', 'data') or [] %}
          {% set dag = now().strftime('%Y-%m-%d') %}
          {% set ns = namespace(count=0) %}
          {% for x in data %}
            {% if x.start_time[:10] == dag %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          rows: >
            {% set data = state_attr('sensor.sannesholma_2181_diagramdataexport', 'data') or [] %}
            {% set spot = state_attr('sensor.elpris', 'today') or [] %}
            {% set dag = now().strftime('%Y-%m-%d') %}

            {% set elnat = states('sensor.avgift_elnat') | float(0) / 100 %}
            {% set energiskatt = states('sensor.avgift_energiskatt') | float(0) / 100 %}

            {% set spot_mean = (spot | sum / spot | length) if spot | length > 0 else none %}
            {% set spot_max = (spot | max) if spot | length > 0 else none %}
            {% set spot_min = (spot | min) if spot | length > 0 else none %}

            {% set ns = namespace(rows=[]) %}

            {% for x in data if x.start_time[:10] == dag %}
              {% set i = loop.index0 %}
              {% set h = (i / 4) | int %}
              {% set s = as_datetime(x.start_time) %}
              {% set e = s + timedelta(minutes=15) %}
              {% set tibber = x.price_per_kwh | float(0) %}

              {% if spot | length == 96 %}
                {% set pris = spot[i] | float(0) %}
              {% elif spot | length == 24 %}
                {% set pris = spot[h] | float(0) %}
              {% else %}
                {% set pris = none %}
              {% endif %}

              {% if pris is none %}
                {% set kommentar = 'Pris saknas' %}
              {% elif spot_max is not none and pris == spot_max %}
                {% set kommentar = 'Högsta pris' %}
              {% elif spot_min is not none and pris == spot_min %}
                {% set kommentar = 'Lägsta pris' %}
              {% elif spot_mean is not none and pris < spot_mean %}
                {% set kommentar = 'Under medel' %}
              {% else %}
                {% set kommentar = '' %}
              {% endif %}

              {% set ns.rows = ns.rows + [{
                'index': i,
                'quarter': 'q%02d' | format(i),
                'timme': s.strftime('%H:%M') ~ ' - ' ~ e.strftime('%H:%M'),
                'pris': (pris | round(3)) if pris is not none else none,
                'tibber': tibber | round(3),
                'total': (tibber + elnat + energiskatt) | round(3),
                'kommentar': kommentar
              }] %}
            {% endfor %}

            {{ ns.rows }}

      - name: Elpris imorgon kvartstabell
        unique_id: elpris_imorgon_kvartstabell
        icon: mdi:table-clock-outline
        state: >
          {% set data = state_attr('sensor.sannesholma_2181_diagramdataexport', 'data') or [] %}
          {% set dag = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {% set ns = namespace(count=0) %}
          {% for x in data %}
            {% if x.start_time[:10] == dag %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          rows: >
            {% set data = state_attr('sensor.sannesholma_2181_diagramdataexport', 'data') or [] %}
            {% set spot = state_attr('sensor.elpris', 'tomorrow') or [] %}
            {% set dag = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}

            {% set elnat = states('sensor.avgift_elnat') | float(0) / 100 %}
            {% set energiskatt = states('sensor.avgift_energiskatt') | float(0) / 100 %}

            {% set spot_mean = (spot | sum / spot | length) if spot | length > 0 else none %}
            {% set spot_max = (spot | max) if spot | length > 0 else none %}
            {% set spot_min = (spot | min) if spot | length > 0 else none %}

            {% set ns = namespace(rows=[]) %}

            {% for x in data if x.start_time[:10] == dag %}
              {% set i = loop.index0 %}
              {% set h = (i / 4) | int %}
              {% set s = as_datetime(x.start_time) %}
              {% set e = s + timedelta(minutes=15) %}
              {% set tibber = x.price_per_kwh | float(0) %}

              {% if spot | length == 96 %}
                {% set pris = spot[i] | float(0) %}
              {% elif spot | length == 24 %}
                {% set pris = spot[h] | float(0) %}
              {% else %}
                {% set pris = none %}
              {% endif %}

              {% if pris is none %}
                {% set kommentar = 'Pris saknas' %}
              {% elif spot_max is not none and pris == spot_max %}
                {% set kommentar = 'Högsta pris' %}
              {% elif spot_min is not none and pris == spot_min %}
                {% set kommentar = 'Lägsta pris' %}
              {% elif spot_mean is not none and pris < spot_mean %}
                {% set kommentar = 'Under medel' %}
              {% else %}
                {% set kommentar = '' %}
              {% endif %}

              {% set ns.rows = ns.rows + [{
                'index': i,
                'quarter': 'q%02d' | format(i),
                'timme': s.strftime('%H:%M') ~ ' - ' ~ e.strftime('%H:%M'),
                'pris': (pris | round(3)) if pris is not none else none,
                'tibber': tibber | round(3),
                'total': (tibber + elnat + energiskatt) | round(3),
                'kommentar': kommentar
              }] %}
            {% endfor %}

            {{ ns.rows }}