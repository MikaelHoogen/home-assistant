# =================================================================
# LOGIK FÖR FILAMENT- OCH FÖNSTERBELYSNING – ALLRUM
# =================================================================
# All logik för att styra dekorativ belysning i allrummet:
#  - Filament/dekor (huslampa + trappa) – egen lux-tröskel
#  - Fönsterbelysning – egen lux-tröskel
#
# Blockeras vid:
#  - film_spelar
#  - sovdags
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.allrum_filament_light_level
#  - input_number.allrum_fonster_light_level
#
# OBS! Lampor styrs via Light Groups i UI:
#  - light.allrum_styrning_filament   <-- huslampa + trappa
#  - light.allrum_styrning_fonster
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
# Profil för filament/dekor-lampor.
# -----------------------------------------------------------------
adaptive_lighting:
  - name: Allrum belysning filament
    lights:
      - light.allrum_huslampa
      - light.trappa
    transition: 45
    initial_transition: 5
    interval: 90
    min_brightness: 1
    max_brightness: 35
    sleep_brightness: 1
    take_over_control: true
    detect_non_ha_changes: false
    adapt_only_on_bare_turn_on: true


# =================================================================
# SENSORER SOM STYR AUTOMATIONERNA
# =================================================================
template:
  - binary_sensor:
      # -------------------------------------------------------------
      # Steg 1: Är det mörkt nog för fönsterbelysning?
      # -------------------------------------------------------------
      - name: allrum_belysning_fonster_lightlevel
        unique_id: allrum_belysning_fonster_lightlevel
        device_class: light
        delay_off:
          minutes: 5
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.allrum_fonster_light_level') | float(0)) }}

      # -------------------------------------------------------------
      # Steg 1: Är det mörkt nog för filament/dekor?
      # -------------------------------------------------------------
      - name: allrum_belysning_filament_lightlevel
        unique_id: allrum_belysning_filament_lightlevel
        device_class: light
        delay_off:
          minutes: 5
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.allrum_filament_light_level') | float(0)) }}

      # -------------------------------------------------------------
      # Steg 2: Kontrollsensor för fönsterbelysning
      # -------------------------------------------------------------
      - name: allrum_belysning_automation_control_fonster
        unique_id: allrum_belysning_automation_control_fonster
        state: >
          {{ is_state('binary_sensor.allrum_belysning_fonster_lightlevel', 'on')
            and is_state('input_boolean.film_spelar', 'off')
            and is_state('input_boolean.sovdags', 'off') }}

      # -------------------------------------------------------------
      # Steg 2: Kontrollsensor för filament/dekor
      # -------------------------------------------------------------
      - name: allrum_belysning_automation_control_filament
        unique_id: allrum_belysning_automation_control_filament
        state: >
          {{ is_state('binary_sensor.allrum_belysning_filament_lightlevel', 'on')
            and is_state('input_boolean.film_spelar', 'off')
            and is_state('input_boolean.sovdags', 'off') }}


# =================================================================
# AUTOMATIONER
# =================================================================
automation:
  # =================================================================
  # ALLRUM – DEKORBELYSNING (STYRNING)
  # =================================================================
  # En automation som mappar automation_control -> light group i UI.
  # -----------------------------------------------------------------
  - alias: Allrum belysning
    id: allrum_belysning
    mode: queued
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.allrum_belysning_automation_control_fonster
          - binary_sensor.allrum_belysning_automation_control_filament
      - trigger: homeassistant
        event: start

    actions:
      # -------------------------------------------------------------
      # DEL A: Fönsterbelysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.allrum_belysning_automation_control_fonster') }}"
        target:
          entity_id: light.allrum_styrning_fonster

      # -------------------------------------------------------------
      # DEL B: Filament/dekor (huslampa + trappa)
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.allrum_belysning_automation_control_filament') }}"
        target:
          entity_id: light.allrum_styrning_filament