# =================================================================
# KONFIGURATION FÖR MIKAELS RUM
# =================================================================
# All logik för att styra belysning och automationer i Mikaels rum.
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.mikaels_rum_fonster_light_level
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFILER
# =================================================================
# Justerar automatiskt färgtemperatur och ljusstyrka på lamporna
# baserat på dygnsrytm (solens position).
# -----------------------------------------------------------------
adaptive_lighting:
  # ---------------------------------------------------------------
  # Profil: Primär belysning
  # ---------------------------------------------------------------
  - name: Mikaels rum
    lights:
      - light.mikaels_rum_hue_play_1
      - light.mikaels_rum_hue_play_2
      - light.mikaels_rum_hue_play_3
      - light.mikaels_rum_fonster
      - light.mikaels_rum_skrivbord
      - light.mikaels_rum_tak
    prefer_rgb_color: false
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 10
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    # max_sunrise_time: "07:00:00"
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true

  # ---------------------------------------------------------------
  # Profil: Ljusslinga
  # ---------------------------------------------------------------
  - name: Mikaels rum ljusslinga
    lights:
      - light.mikaels_rum_ljusslinga
    prefer_rgb_color: false
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 70
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    # max_sunrise_time: "07:00:00"
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
# Dessa sensorer utgör grunden för automationerna.
# -----------------------------------------------------------------
template:
  - binary_sensor:
      # =============================================================
      # FÖNSTERBELYSNING
      # =============================================================
      # Steg 1: Är det mörkt nog ute för att tända?
      - name: mikaels_rum_belysning_lightlevel
        unique_id: mikaels_rum_belysning_lightlevel
        device_class: light
        delay_off:
          minutes: 5
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.mikaels_rum_fonster_light_level') | float(0)) }}

      # Steg 2: Kontrollsensor som triggar fönsterbelysningen
      - name: mikaels_rum_belysning_automation_control
        unique_id: mikaels_rum_belysning_automation_control
        state: >
          {{ is_state('binary_sensor.mikaels_rum_belysning_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}


      # =============================================================
      # NÄRVARO / TIDSRÄKNING FÖR AVSTÄNGNING
      # =============================================================
      # Närvaro med fördröjning (undviker "fladder")
      - name: mikaels_rum_narvaro
        unique_id: mikaels_rum_narvaro
        device_class: motion
        delay_off:
          minutes: 10
        state: >
          {{ is_state('binary_sensor.mikaels_rum_rorelsesensor', 'on') }}

      # "Av-timer" – släcker när sensorn går off efter 60 min
      - name: mikaels_rum_belysning_av
        unique_id: mikaels_rum_belysning_av
        delay_off:
          minutes: 60
        state: >
          {{ is_state('binary_sensor.mikaels_rum_rorelsesensor', 'on') }}


# =================================================================
# AUTOMATIONER
# =================================================================
automation:
  # =================================================================
  # FÖNSTERBELYSNING
  # =================================================================
  - alias: Mikaels rum belysning fönster
    id: mikaels_rum_belysning_fonster
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.mikaels_rum_belysning_automation_control
      - trigger: homeassistant
        event: start
    actions:
      - action: "light.turn_{{ states('binary_sensor.mikaels_rum_belysning_automation_control') }}"
        target:
          entity_id: light.mikaels_rum_fonster


  # =================================================================
  # SLÄCK VID FRÅNVARO
  # =================================================================
  # Släcker den primära belysningen när ingen har varit i rummet på 60 min.
  - alias: Mikaels rum belysning av
    id: mikaels_rum_belysning_av
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.mikaels_rum_belysning_av
        to: "off"
    actions:
      - action: light.turn_off
        target:
          entity_id: light.mikaels_rum