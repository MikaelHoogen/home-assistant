# =================================================================
# LOGIK FÖR BELYSNING – STUDIO
# =================================================================
# All logik för att styra belysningen i studion uppdelat i:
#  - Allmän belysning (arbetsljus)
#  - Filament (stämning)
#  - Fönsterbelysning
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.studio_light_level
#  - input_number.studio_filament_light_level
#  - input_number.studio_fonster_light_level
#
# OBS! Lampor styrs via Light Groups i UI:
#  - light.studio_styrning
#  - light.studio_styrning_filament
#  - light.studio_styrning_fonster
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING – PROFILER
# =================================================================
adaptive_lighting:
  # ---------------------------------------------------------------
  # Studio – allmän belysning
  # ---------------------------------------------------------------
  - name: Studio
    lights:
      - light.studio_vit_skarmlampa
      - light.linas_skrivbord
    transition: 30
    initial_transition: 1
    interval: 90
    min_brightness: 30
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true

  # ---------------------------------------------------------------
  # Studio – filament
  # ---------------------------------------------------------------
  - name: Studio filament
    lights:
      - light.studio_hylla
      - light.studio_fonster
    transition: 30
    initial_transition: 1
    interval: 90
    min_brightness: 1
    max_brightness: 35
    sleep_brightness: 1
    take_over_control: true
    adapt_only_on_bare_turn_on: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
template:
  - binary_sensor:

      # =============================================================
      # STUDIO – ALLMÄN BELYSNING
      # =============================================================
      - name: studio_belysning_lightlevel
        unique_id: studio_belysning_lightlevel
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.studio_light_level') | float(0)) }}

      - name: studio_belysning_automation_control
        unique_id: studio_belysning_automation_control
        state: >
          {{ is_state('binary_sensor.studio_belysning_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}


      # =============================================================
      # STUDIO – FILAMENT
      # =============================================================
      - name: studio_belysning_filament_lightlevel
        unique_id: studio_belysning_filament_lightlevel
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.studio_filament_light_level') | float(0)) }}

      - name: studio_belysning_filament_automation_control
        unique_id: studio_belysning_filament_automation_control
        state: >
          {{ is_state('binary_sensor.studio_belysning_filament_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}


      # =============================================================
      # STUDIO – FÖNSTERBELYSNING
      # =============================================================
      - name: studio_belysning_fonster_lightlevel
        unique_id: studio_belysning_fonster_lightlevel
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.studio_fonster_light_level') | float(0)) }}

      - name: studio_belysning_fonster_automation_control
        unique_id: studio_belysning_fonster_automation_control
        state: >
          {{ is_state('binary_sensor.studio_belysning_fonster_lightlevel', 'on')
            and is_state('input_boolean.sovdags', 'off') }}


# =================================================================
# AUTOMATIONER
# =================================================================
automation:
  # =================================================================
  # STUDIO – BELYSNING (STYRNING)
  # =================================================================
  - alias: Studio belysning
    id: studio_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.studio_belysning_automation_control
          - binary_sensor.studio_belysning_filament_automation_control
          - binary_sensor.studio_belysning_fonster_automation_control
      - trigger: homeassistant
        event: start

    actions:
      # -------------------------------------------------------------
      # DEL A: Allmän belysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.studio_belysning_automation_control') }}"
        target:
          entity_id: light.studio_styrning

      # -------------------------------------------------------------
      # DEL B: Filament
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.studio_belysning_filament_automation_control') }}"
        target:
          entity_id: light.studio_styrning_filament

      # -------------------------------------------------------------
      # DEL C: Fönsterbelysning
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.studio_belysning_fonster_automation_control') }}"
        target:
          entity_id: light.studio_styrning_fonster