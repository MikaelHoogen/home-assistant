# =====================================================================
# STYRNING – VÄRMEPUMP (Nibe)
# =====================================================================
#
# Helpers (skapas i UI, inte i denna fil):
#   - timer.heatpump_hotwater_boost
#       Manuell varmvatten-boost (t.ex. 2h).
#
#   - timer.heatpump_radiators_only
#       Manuell "värme endast radiatorer" (t.ex. 2h).
#       Golvvärmepump / cirkulationspump för golvvärme hålls AV.
#
#   - input_number.heatpump_integral_target
#       Önskad integral-nivå ("skuld") att ligga kring medan pumpen är blockerad,
#       för att inte bygga upp för stor skuld innan EMHASS släpper till heat.
#       Ex: -200.
#
#   - input_number.heatpump_integral_hysteresis
#       Hur mycket lägre (mer negativ) integral vi tillåter under block innan vi
#       aktiverar kompensering yttre för att bromsa skuldökningen.
#       Ex: 50  → nedre gräns blir (target - 50), t.ex. -250.
#
# Princip:
#   - heat:
#       Normal drift (block OFF, komp yttre OFF).
#       Under läget "heat" sköter värmepumpen sin reglering helt själv.
#       Golvvärmepump (switch.heatpump_floorcircuit) ON.
#
#   - radiators_only:
#       Värme endast radiatorer (block OFF, komp yttre OFF).
#       Golvvärmepump (switch.heatpump_floorcircuit) OFF.
#
#   - hotwater_only:
#       Endast varmvatten (block OFF, komp yttre ON konstant).
#       Golvvärmepump OFF.
#
#   - blocked:
#       Kompressorn blockeras ALLTID av EMHASS.
#       Kompensering yttre används ENBART för att begränsa integral-skuld under block
#       så att vi inte får ett extremt utgångsläge när EMHASS senare släpper till heat.
#       Golvvärmepump OFF.
#
# Integral-logik (hysteresband under block):
#   - target        (ex -200) = "rimlig skuld" vi vill ligga kring under block
#   - lower         (ex -250) = target - hysteres
#   - När integral >= target  → komp yttre OFF
#   - När integral <= lower   → komp yttre ON
#   - Inom bandet             → behåll senaste läge (för att undvika fladder)
#
# EMHASS workaround:
#   - Verkställning sker endast 1 gång per kvart (2/17/32/47)
#   - Varmvatten-timer slår igenom direkt
#
# OBS:
# - Byt switch.nibe_kompensering_yttre till din faktiska Shelly-switch om den heter annat. Tillfälligt switch.kok_varmegolv
# - Om Nibe-ingången är inverterad: byt turn_on/turn_off för Shelly.
# =====================================================================

template:
  - sensor:
      # ---------------------------------------------------------------
      # MODE – strategiskt driftläge
      # ---------------------------------------------------------------
    - name: heatpump_mode
      unique_id: heatpump_mode
      state: >-
        {% if is_state('timer.heatpump_hotwater_boost', 'active') %}
          hotwater_only
        {% elif is_state('timer.heatpump_radiators_only', 'active') %}
          radiators_only
        {% elif is_state('binary_sensor.heatpump_emhass', 'off') %}
          blocked
        {%- else -%}
          heat
        {%- endif %}

  - binary_sensor:
      # ---------------------------------------------------------------
      # KOMPENSERING YTTRE
      #
      # - hotwater_only: alltid ON
      # - heat: OFF (pumpen sköter reglering helt själv)
      # - radiators_only: OFF (värme bara radiatorer, ingen komp yttre)
      # - blocked: hysteresband på integralen för att begränsa skuld
      # ---------------------------------------------------------------
      - name: heatpump_kompensering_yttre
        unique_id: heatpump_kompensering_yttre
        state: >
          {% set mode = states('sensor.heatpump_mode') %}
          {% set integral = states('sensor.heatpump_integral') | float(0) %}
          {% set target = states('input_number.heatpump_integral_target') | float(-200) %}
          {% set h = states('input_number.heatpump_integral_hysteresis') | float(50) %}
          {% set lower = target - h %}

          {% if mode == 'hotwater_only' %}
            true

          {% elif mode == 'blocked' %}
            {% if integral >= target %}
              false
            {% elif integral <= lower %}
              true
            {% else %}
              {{ is_state('switch.kok_varmegolv', 'on') }}
            {% endif %}

          {% else %}
            false
          {% endif %}

automation:
  - alias: Heatpump styrning
    id: heatpump_styrning
    mode: single

    triggers:
      # Kvart-lås (EMHASS-fladder-workaround)
      - trigger: time_pattern
        minutes: 2
      - trigger: time_pattern
        minutes: 17
      - trigger: time_pattern
        minutes: 32
      - trigger: time_pattern
        minutes: 47

      # Varmvatten ska slå igenom direkt
      - trigger: state
        entity_id: timer.heatpump_hotwater_boost

      # Radiatorer-only ska slå igenom direkt
      - trigger: state
        entity_id: timer.heatpump_radiators_only

      # Kompensering yttre ska slå igenom direkt
      - trigger: state
        entity_id: binary_sensor.heatpump_kompensering_yttre

      # Failsafe
#      - trigger: homeassistant
#        event: start

    actions:
      # ---------------------------------------------------------------
      # 1) HÅRD BLOCKERING – mode -> switch.heatpump
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.heatpump_mode
                state: "blocked"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.heatpump
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.heatpump

      # ---------------------------------------------------------------
      # 2) KOMPENSERING YTTRE (Shelly)
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.heatpump_kompensering_yttre
                state: "on"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.kok_varmegolv
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.kok_varmegolv

      # ---------------------------------------------------------------
      # 3) GOLVVÄRMEPUMP (smartplug)
      #    - Endast ON i läget "heat"
      #    - OFF i radiators_only / hotwater_only / blocked
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.heatpump_mode
                state: "heat"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.heatpump_floorcircuit
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.heatpump_floorcircuit