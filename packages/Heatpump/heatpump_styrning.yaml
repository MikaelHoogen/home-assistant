# =====================================================================
# STYRNING – VÄRMEPUMP (Nibe)
# =====================================================================
#
# Helpers (skapas i UI, inte i denna fil):
#   - timer.heatpump_hotwater_boost
#       Manuell varmvatten-boost (t.ex. 2h).
#
#   - timer.heatpump_radiators_only
#       Manuell "värme endast radiatorer" (t.ex. 2h).
#       Golvvärmens cirkulationspump av + golvventiler stängda.
#
#   - timer.heatpump_heat_floor_boost
#       Manuell "värme + golvvärme" (t.ex. 2h).
#       Forcerar VP-tillåtelse och golvvärme ON (override av block).
#
#   - input_boolean.heatpump_slot_hold
#       Hållflagga per 15-minutersslot.
#       Sätts när EMHASS slår till värme, släpps vid kvartskifte.
#
#   - input_number.heatpump_integral_target
#       Önskad integral-nivå under block (ex -200).
#
#   - input_number.heatpump_integral_hysteresis
#       Hysteres under block (ex 50 → lower = target - 50).
#
# Entiteter:
#   - binary_sensor.heatpump_emhass
#       ON  = värme tillåts av EMHASS
#       OFF = värme blockeras av EMHASS
#
#   - switch.heatpump
#       Relä för hård blockering av kompressor (ON = blockerad)
#
#   - switch.heatpump_floorcircuit
#       Smartplug/cirkpump för golvvärme (ON = cirkulerar)
#
#   - switch.vardagsrum_varmegolv / switch.barnrum_varmegolv / switch.sovrum_varmegolv
#       Ventiler till golvvärmeslingor (ON = öppna)
#
#   - switch.kok_varmegolv
#       Shelly för "kompensering yttre" (ON = komp aktiv)
#
# Driftlägen:
#   - heat:
#       Normal drift (block OFF, komp OFF). Golvvärme ON (pump + ventiler).
#
#   - heat_forced:
#       Manuell override (block OFF, komp OFF). Golvvärme ON (pump + ventiler).
#
#   - radiators_only:
#       Värme endast radiatorer (block OFF, komp OFF).
#       Golvvärme OFF (pump OFF + ventiler stängda).
#
#   - hotwater_only:
#       Endast varmvatten (block OFF, komp ON konstant).
#       Golvvärme OFF (pump OFF + ventiler stängda).
#
#   - blocked:
#       Blockerad av "tillåtelse"-logiken (block ON).
#       Komp yttre hysteres på integralen för att begränsa skuld.
#       Golvvärme OFF (pump OFF + ventiler stängda).
#
# Watchdog:
#   - Periodisk verkställning var 2:e minut för att hämta upp fall där
#     en switch var unavailable exakt vid state-change.
# =====================================================================

template:
  - binary_sensor:
      # ---------------------------------------------------------------
      # HEAT ALLOWED – tillåtelse som används av mode-logiken
      # ---------------------------------------------------------------
      - name: heatpump_heat_allowed
        unique_id: heatpump_heat_allowed
        delay_off:
          seconds: 60
        state: >-
          {{ is_state('binary_sensor.heatpump_emhass', 'on')
            or is_state('input_boolean.heatpump_slot_hold', 'on') }}

  - sensor:
      # ---------------------------------------------------------------
      # MODE – strategiskt driftläge
      # Prioritet:
      #   1) hotwater_boost
      #   2) heat+floor_boost (override)
      #   3) radiators_only
      #   4) blocked (heat_allowed)
      #   5) heat
      # ---------------------------------------------------------------
      - name: heatpump_mode
        unique_id: heatpump_mode
        state: >-
          {% if is_state('timer.heatpump_hotwater_boost', 'active') -%}
            hotwater_only
          {%- elif is_state('timer.heatpump_heat_floor_boost', 'active') -%}
            heat_forced
          {%- elif is_state('timer.heatpump_radiators_only', 'active') -%}
            radiators_only
          {%- elif is_state('binary_sensor.heatpump_heat_allowed', 'off') -%}
            blocked
          {%- else -%}
            heat
          {%- endif %}

  - binary_sensor:
      # ---------------------------------------------------------------
      # KOMPENSERING YTTRE
      #
      # - hotwater_only: alltid ON
      # - heat / heat_forced / radiators_only: OFF
      # - blocked: hysteresband på integralen för att begränsa skuld
      # ---------------------------------------------------------------
      - name: heatpump_kompensering_yttre
        unique_id: heatpump_kompensering_yttre
        state: >-
          {% set mode = states('sensor.heatpump_mode') %}
          {% set integral = states('sensor.heatpump_integral') | float(0) %}
          {% set target = states('input_number.heatpump_integral_target') | float(-200) %}
          {% set h = states('input_number.heatpump_integral_hysteresis') | float(50) %}
          {% set lower = target - h %}

          {% if mode == 'hotwater_only' -%}
            true

          {%- elif mode == 'blocked' -%}
            {%- if integral >= target -%}
              false
            {%- elif integral <= lower -%}
              true
            {%- else -%}
              {{ is_state('switch.kok_varmegolv', 'on') }}
            {%- endif -%}

          {%- else -%}
            false
          {% endif %}

automation:
  # ===================================================================
  # HEATPUMP – HÅLLFLAGGA PER 15-MINUTERSSLOT
  # ===================================================================
  # Funktion:
  #   - När EMHASS slår till värme i en slot: hållflagga ON tills kvartskifte.
  #   - Vid kvartskifte: hållflagga OFF.
  # ===================================================================
  - alias: Heatpump hållflagga per kvart
    id: heatpump_slot_hold
    mode: single

    triggers:
      - trigger: state
        entity_id: binary_sensor.heatpump_emhass
        to: "on"

      - trigger: time_pattern
        minutes: "/15"
        seconds: 0

    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.platform == 'state' }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.heatpump_slot_hold
        default:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.heatpump_slot_hold

  # ===================================================================
  # HEATPUMP – HUVUDSTYRNING (MODE → AKTUATORER)
  # ===================================================================
  - alias: Heatpump styrning
    id: heatpump_styrning
    mode: single

    triggers:
      # Mode ändras → verkställ styrning
      - trigger: state
        entity_id: sensor.heatpump_mode

      # Periodisk verkställning (watchdog mot "unavailable" vid tidigare körning)
      - trigger: time_pattern
        minutes: "/2"

    actions:
      # ---------------------------------------------------------------
      # 1) HÅRD BLOCKERING AV VÄRMEPUMP
      #
      # Definition:
      #   - mode == "blocked"  → blockering ON
      #   - alla andra lägen   → blockering OFF
      #
      # switch.heatpump är ett relä som fysiskt stoppar kompressorn.
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.heatpump_mode
                state: "blocked"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.heatpump
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.heatpump

      # ---------------------------------------------------------------
      # 2) GOLVVÄRME – CIRKULATIONSPUMP
      #
      # Definition:
      #   - mode == "heat" eller "heat_forced" → ON
      #   - övriga lägen                       → OFF
      #
      # Golvvärmen ska endast cirkulera när värme
      # faktiskt tillåts till golvslingorna.
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.heatpump_mode') in ['heat', 'heat_forced'] }}
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.heatpump_floorcircuit
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.heatpump_floorcircuit

      # ---------------------------------------------------------------
      # 3) GOLVVÄRME – VENTILER / TERMOSTATER
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.heatpump_mode') in ['heat', 'heat_forced'] }}
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.vardagsrum_varmegolv

              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.barnrum_varmegolv
                    - climate.sovrum_varmegolv
                data:
                  hvac_mode: heat

        default:
          - action: switch.turn_off
            target:
              entity_id: switch.vardagsrum_varmegolv

          - action: climate.set_hvac_mode
            target:
              entity_id:
                - climate.barnrum_varmegolv
                - climate.sovrum_varmegolv
            data:
              hvac_mode: "off"

  # ===================================================================
  # HEATPUMP – KOMPENSERING YTTRE (SPEGELLOGIK)
  # ===================================================================
  # Denna automation:
  #   - speglar beslutet i binary_sensor.heatpump_kompensering_yttre
  #     direkt till ett relä (Shelly)
  #
  # All logik för NÄR komp yttre ska vara på/av
  # ligger i templaten för binary_sensor.
  #
  # Automationens enda ansvar:
  #   binary_sensor ON  → switch ON
  #   binary_sensor OFF → switch OFF
  # ===================================================================
  - alias: Heatpump kompensering yttre
    id: heatpump_kompensering_yttre
    mode: single

    triggers:
      # Beslut ändras → spegla till relä
      - trigger: state
        entity_id: binary_sensor.heatpump_kompensering_yttre

      # Periodisk verkställning (watchdog mot "unavailable" vid tidigare körning)
      - trigger: time_pattern
        minutes: "/2"

    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.heatpump_kompensering_yttre
                state: "on"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.kok_varmegolv
        default:
          - action: switch.turn_off
            target:
              entity_id: switch.kok_varmegolv