#
################# Circadian ##############################################
adaptive_lighting:
  - name: Ljusstakar
    lights:
      # Allrum mot altan dimmer
      - light.ac_000000a_1
      # Allrum mot entré dimmer
      - light.ac0000001_4
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 70
    max_brightness: 80
    sleep_brightness: 1
    take_over_control: true
#
  - name: Kök Ljusstake
    lights:
      # Kök
      - light.ac_0000001_3
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 90
    max_brightness: 100
    sleep_brightness: 1
    take_over_control: true
#
  - name: Sovrum julstjarna
    lights:
      # Julstjärna
      - light.sovrum_julstjarna
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 100
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    take_over_control: true
    detect_non_ha_changes: true
#
