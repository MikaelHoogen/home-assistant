# =================================================================
# LOGIK FÖR UTOMHUSBELYSNING
# =================================================================
# All logik för att styra utomhusbelysning, carport och entré baserat
# på lux (mörker), närvaro och lägen.
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.utomhusbelysning_light_level  <-- Lux-tröskel (utomhusbelysning)
#
# OBS! Lampor styrs via Light Groups i UI:
#  - light.utomhusbelysning_styrning              <-- Lampor som följer "mörkt ute"-styrning
#  - light.utomhusbelysning_styrning_film         <-- Lampor som släcks vid film
#  - light.utomhusbelysning_styrning_sovdags      <-- Lampor som släcks vid sovdags
#
# VIKTIGT: För att undvika "kamp" mellan grupper:
#  - Lägg inte samma lampa i både utomhusbelysning_styrning och
#    utomhusbelysning_styrning_sovdags.
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING PROFILER
# =================================================================
# Profiler för olika typer av utelampor.
# -----------------------------------------------------------------
adaptive_lighting:
  # ---------------------------------------------------------------
  # PROFIL: Utomhusbelysning (ej Hue)
  # ---------------------------------------------------------------
  - name: Utomhusbelysning
    lights:
      - light.koksentre_dorr
    prefer_rgb_color: false
    transition: 0
    initial_transition: 0
    interval: 90
    min_brightness: 90
    max_brightness: 100
    min_color_temp: 2200
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_color_temp: 2200
    take_over_control: true
    detect_non_ha_changes: false
    only_once: false
    separate_turn_on_commands: true

  # ---------------------------------------------------------------
  # PROFIL: Entré (Hue)
  # ---------------------------------------------------------------
  - name: Utomhusbelysning hue
    lights:
      - light.entre_dorr
    prefer_rgb_color: false
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 20
    max_brightness: 100
    min_color_temp: 2100
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_color_temp: 2200
    take_over_control: true
    detect_non_ha_changes: false
    adapt_only_on_bare_turn_on: true

  # ---------------------------------------------------------------
  # PROFIL: Filament / fasta varmvita (dimning i fokus)
  # ---------------------------------------------------------------
  - name: Utomhusbelysning filament
    lights:
      - light.snickarboa_entre
      - light.stall_entre
      - light.carport_entre
      - light.kackorna_entre
      - light.stolpe_gang
      - light.stolpe_grind
      - light.groventre_dorr
    prefer_rgb_color: false
    transition: 30
    initial_transition: 5
    interval: 90
    min_brightness: 60
    max_brightness: 100
    sleep_brightness: 1
    sleep_color_temp: 2200
    take_over_control: true
    detect_non_ha_changes: false
    adapt_only_on_bare_turn_on: true


# =================================================================
# SENSORER SOM STYR AUTOMATIONERNA
# =================================================================
# Här skapas binary_sensors som uttrycker villkor och "automation_control".
# -----------------------------------------------------------------
template:
  - binary_sensor:

      # =================================================================
      # UTOMHUSBELYSNING – GRUND (MÖRKT UTE)
      # =================================================================
      # Grundbeslutet "mörkt ute" används som bas för all utomhusstyrning.
      # -----------------------------------------------------------------

      # Steg 1: Är det mörkt nog för utomhusbelysning?
      - name: utomhusbelysning_light_level
        unique_id: utomhusbelysning_light_level
        device_class: light
        delay_off:
          minutes: 10
        state: >
          {{ (states('sensor.entre_hue_outdoor_motion_sensor_light_level') | float(9999))
              < (states('input_number.utomhusbelysning_light_level') | float(0)) }}

      # Steg 2: Kontrollsensor som triggar "mörkt ute"-styrningen
      - name: utomhusbelysning_automation_control
        unique_id: utomhusbelysning_automation_control
        state: >
          {{ is_state('binary_sensor.utomhusbelysning_light_level', 'on') }}

      # =================================================================
      # UTOMHUSBELYSNING – FILM
      # =================================================================
      # Samma grundsignal som ovan, men blockeras när film_spelar = on.
      # -----------------------------------------------------------------
      - name: utomhusbelysning_automation_control_film
        unique_id: utomhusbelysning_automation_control_film
        state: >
          {{ is_state('binary_sensor.utomhusbelysning_automation_control', 'on')
            and is_state('input_boolean.film_spelar', 'off') }}

      # =================================================================
      # UTOMHUSBELYSNING – SOVDAGS
      # =================================================================
      # Samma grundsignal som ovan, men blockeras när sovdags = on.
      # (Film blockar även sovdagsgruppen så det blir konsekvent.)
      # -----------------------------------------------------------------
      - name: utomhusbelysning_automation_control_sovdags
        unique_id: utomhusbelysning_automation_control_sovdags
        state: >
          {{ is_state('binary_sensor.utomhusbelysning_automation_control', 'on')
            and is_state('input_boolean.film_spelar', 'off')
            and is_state('input_boolean.sovdags', 'off') }}

      # =================================================================
      # ENTRÉ – NÄRVARO
      # =================================================================
      # Entrélampan följer mörker (via grupp) + kan tillfälligt maxas vid närvaro.
      # -----------------------------------------------------------------

      # Steg 1: Närvaro vid entrén (motion + dörrtrigger)
      - name: entre_presence
        unique_id: entre_presence
        device_class: motion
        delay_off:
          minutes: 5
        state: >
          {{ is_state('binary_sensor.entre_hue_outdoor_motion_sensor_motion', 'on')
            or is_state('binary_sensor.hall_dorrtrigger', 'on') }}

      # Steg 2: Kontrollsensor för entré-närvaroläge (mörkt + närvaro)
      - name: entre_presence_automation_control
        unique_id: entre_presence_automation_control
        state: >
          {{ is_state('binary_sensor.utomhusbelysning_light_level', 'on')
            and is_state('binary_sensor.entre_presence', 'on') }}

      # =================================================================
      # CARPORT
      # =================================================================
      # Carportbelysning tänds bara vid närvaro när det är mörkt.
      # -----------------------------------------------------------------
      - name: carport_belysning_automation_control
        unique_id: carport_belysning_automation_control
        state: >
          {{ is_state('binary_sensor.utomhusbelysning_light_level', 'on')
            and is_state('binary_sensor.carport_presence', 'on') }}


# =================================================================
# AUTOMATIONER SOM TÄNDER/SLÄCKER
# =================================================================
# En master-automation styr utomhusbelysningens grupper.
# Entré närvaroläge och carport lämnas separata.
# -----------------------------------------------------------------
automation:
  # =================================================================
  # UTOMHUSBELYSNING (STYRNING + FILM + SOVDAGS) - SAMMANSLAGEN
  # =================================================================
  # DEL A: Grundstyrning (mörkt ute)
  # DEL B: Film (blockeras när film spelar)
  # DEL C: Sovdags (blockeras när sovdags är aktivt)
  #
  # OBS: Entrén ingår i DEL A via gruppen light.utomhusbelysning_styrning (UI)
  # -----------------------------------------------------------------
  - alias: Utomhusbelysning
    id: utomhusbelysning
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.utomhusbelysning_automation_control
          - binary_sensor.utomhusbelysning_automation_control_film
          - binary_sensor.utomhusbelysning_automation_control_sovdags
      - trigger: homeassistant
        event: start

    actions:
      # -------------------------------------------------------------
      # DEL A: Utomhusbelysning – styrning (grund)
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.utomhusbelysning_automation_control') }}"
        target:
          entity_id: light.utomhusbelysning_styrning  # <-- Grupp i UI

      # -------------------------------------------------------------
      # DEL B: Utomhusbelysning – styrning (film)
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.utomhusbelysning_automation_control_film') }}"
        target:
          entity_id: light.utomhusbelysning_styrning_film  # <-- Grupp i UI

      # -------------------------------------------------------------
      # DEL C: Utomhusbelysning – styrning (sovdags)
      # -------------------------------------------------------------
      - action: "light.turn_{{ states('binary_sensor.utomhusbelysning_automation_control_sovdags') }}"
        target:
          entity_id: light.utomhusbelysning_styrning_sovdags  # <-- Grupp i UI

  # =================================================================
  # ENTRÉ (NÄRVAROLÄGE)
  # =================================================================
  # När någon är vid entrén -> maxa ljuset och pausa adapt_brightness.
  # När närvaro slutar -> återaktivera adapt_brightness.
  # -----------------------------------------------------------------
  - alias: Entré närvarobelysning
    id: entre_narvarobelysning
    mode: restart
    triggers:
      - trigger: state
        entity_id: binary_sensor.entre_presence_automation_control
      - trigger: homeassistant
        event: start

    actions:
      # -------------------------------------------------------------
      # Steg 1: Läs av om "entré närvaro-läge" är aktivt
      # -------------------------------------------------------------
      - variables:
          presence_on: "{{ is_state('binary_sensor.entre_presence_automation_control', 'on') }}"
          # När närvaro = on -> stäng AV adapt_brightness (så vi kan maxa utan att AL dimmar ner)
          # När närvaro = off -> slå PÅ adapt_brightness igen
          adapt_service: "switch.turn_{{ iif(presence_on, 'off', 'on') }}"

      # -------------------------------------------------------------
      # Steg 2: Sätt Adaptive Lighting-läget deterministiskt
      # -------------------------------------------------------------
      - action: "{{ adapt_service }}"
        target:
          entity_id: switch.adaptive_lighting_adapt_brightness_utomhusbelysning_hue

      # -------------------------------------------------------------
      # Steg 3: Vid närvaro -> maxa ljuset
      # -------------------------------------------------------------
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ presence_on }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.entre_dorr
                data:
                  brightness_pct: 100

  # =================================================================
  # CARPORT
  # =================================================================
  - alias: Carport belysning
    id: carport_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.carport_belysning_automation_control
      - trigger: homeassistant
        event: start
    actions:
      - action: "light.turn_{{ states('binary_sensor.carport_belysning_automation_control') }}"
        target:
          entity_id:
            - light.carport_belysning