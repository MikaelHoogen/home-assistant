# =================================================================
# PAKET FÖR BELYSNING I HALLEN
# =================================================================
# All logik för att styra belysningen i hallen.
#
# OBS! Lampor styrs via styrningsgrupp i UI:
#  - light.hall_styrning
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.hall_light_level
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
# Justerar automatiskt färgtemperatur och ljusstyrka på hallens
# lampor baserat på dygnsrytm (solens position).
# -----------------------------------------------------------------
adaptive_lighting:
  - name: Hall
    lights:
      - light.hall
      - light.hall_byra
    transition: 30
    initial_transition: 2
    interval: 90
    min_brightness: 30
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true


# =================================================================
# TEMPLATE-SENSORER
# =================================================================
template:
  # -------------------------------------------------------------
  # Dörrtrigger: skapar en kort "närvaro-puls" när ytterdörren öppnas
  # -------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: binary_sensor.entre_dorrbrytare
        from: "off"
        to: "on"
    binary_sensor:
      - name: hall_dorrtrigger
        unique_id: hall_dorrtrigger
        auto_off: 30
        state: "true"

  - binary_sensor:
      # =============================================================
      # NÄRVARO
      # =============================================================
      # Kombinerar rörelse + dörrtrigger till en närvarosensor
      - name: hall_presence
        unique_id: hall_presence
        device_class: motion
        delay_off:
          minutes: 10
        state: >
          {{ is_state('binary_sensor.hall_hue_motion_sensor_motion', 'on')
            or is_state('binary_sensor.hall_dorrtrigger', 'on') }}

      # =============================================================
      # LJUSNIVÅ (INNE)
      # =============================================================
      # on  = för ljust (tänd inte)
      # off = mörkt nog (OK att tända)
      #
      # Spärrlogik: när hallen väl är tänd ska den inte “fladdra”
      # p.g.a. att lamporna höjer luxvärdet.
      # -------------------------------------------------------------
      - name: hall_lightlevel
        unique_id: hall_lightlevel
        delay_on:
          minutes: 5
        state: >
          {{
            (
              (states('sensor.hall_hue_motion_sensor_light_level') | float(9999))
              > (states('input_number.hall_light_level') | float(0))
              and is_state('light.hall_styrning', 'off')
            )
            or
            (
              is_state('binary_sensor.hall_lightlevel', 'on')
              and is_state('light.hall_styrning', 'on')
            )
          }}

      # =============================================================
      # AUTOMATION CONTROL
      # =============================================================
      # Trigger när det finns närvaro i "huset" (hall/kök/vardagsrum)
      # och det är mörkt nog i hallen.
      - name: hall_presence_light_automation_control
        unique_id: hall_presence_light_automation_control
        state: >
          {{ ( is_state('binary_sensor.vardagsrum_presence', 'on')
              or is_state('binary_sensor.kok_presence', 'on')
              or is_state('binary_sensor.hall_presence', 'on') )
            and is_state('input_boolean.film_spelar', 'off')
            and is_state('binary_sensor.hall_lightlevel', 'off') }}


# =================================================================
# AUTOMATION
# =================================================================
automation:
  - alias: Hall belysning
    id: hall_belysning
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.hall_presence_light_automation_control
      - trigger: homeassistant
        event: start
    actions:
      - action: "light.turn_{{ states('binary_sensor.hall_presence_light_automation_control') }}"
        target:
          entity_id: light.hall_styrning