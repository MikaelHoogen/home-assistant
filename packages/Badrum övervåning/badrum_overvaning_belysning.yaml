# =================================================================
# LOGIK FÖR BADRUM ÖVERVÅNING – SPOTLIGHTS
# =================================================================
# Styr spotlightsen i badrummet på övervåningen via presence-sensorn.
#
# Styrd lampa:
#  - light.badrum_overvaning_spotlights
#
# OBS! Styrparametrar hanteras via UI (Helpers):
#  - input_number.badrum_overvaning_light_level
# -----------------------------------------------------------------


# =================================================================
# ADAPTIVE LIGHTING-PROFIL
# =================================================================
adaptive_lighting:
  - name: Badrum övervåning spotlights
    lights:
      - light.badrum_overvaning_spotlights
    transition: 30
    sleep_transition: 10
    initial_transition: 1
    interval: 90
    brightness_mode: tanh
    brightness_mode_time_dark: 10000
    min_brightness: 1
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 4000
    sleep_brightness: 1
    sleep_rgb_or_color_temp: rgb_color
    sleep_rgb_color: [255, 161, 40]
    take_over_control: true
    detect_non_ha_changes: true
    adapt_only_on_bare_turn_on: true

template:
  - binary_sensor:
      # =============================================================
      # LJUSNIVÅ
      # =============================================================
      # on  = för ljust (tänd inte)
      # off = mörkt nog (OK att tända)
      #
      # Spärrlogik så att lampan inte påverkar sin egen luxmätning
      # och orsakar fladder direkt efter tändning.
      # -------------------------------------------------------------
      - name: badrum_overvaning_lightlevel
        unique_id: badrum_overvaning_lightlevel
        delay_on:
          minutes: 5
        state: >
          {{
            (
              (states('sensor.badrum_overvaning_presence_sensor_illuminance') | float(9999))
              > (states('input_number.badrum_overvaning_light_level') | float(0))
              and is_state('light.badrum_overvaning_spotlights', 'off')
            )
            or
            (
              is_state('binary_sensor.badrum_overvaning_lightlevel', 'on')
              and is_state('light.badrum_overvaning_spotlights', 'on')
            )
          }}

      # =============================================================
      # NÄRVARO
      # =============================================================
      # Occupancy används som huvudsignal, men PIR får vara med för
      # att ge snabb direktrespons när någon kommer in.
      # Ingen extra delay_off här, det sköts av sensorn själv.
      # -------------------------------------------------------------
      - name: badrum_overvaning_presence
        unique_id: badrum_overvaning_presence
        device_class: motion
        state: >
          {{ is_state('binary_sensor.badrum_overvaning_presence_sensor_presence', 'on')
            or is_state('binary_sensor.badrum_overvaning_presence_sensor_pir_detection', 'on') }}

automation:
  - alias: Badrum övervåning belysning
    id: badrum_overvaning_belysning
    mode: restart

    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.badrum_overvaning_presence
          - binary_sensor.badrum_overvaning_lightlevel

      - trigger: homeassistant
        event: start

    actions:
      - choose:
          # =========================================================
          # TÄND VID NÄRVARO OCH MÖRKT NOG
          # =========================================================
          - conditions:
              - condition: state
                entity_id: binary_sensor.badrum_overvaning_presence
                state: "on"

              - condition: state
                entity_id: binary_sensor.badrum_overvaning_lightlevel
                state: "off"

            sequence:
              - choose:
                  # -------------------------------------------------
                  # Sovdags: använd HA-scen och hindra Adaptive Lighting
                  # från att direkt skriva över scenen.
                  # -------------------------------------------------
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.sovdags
                        state: "on"

                    sequence:
                      - action: adaptive_lighting.set_manual_control
                        data:
                          manual_control: true
                          lights:
                            - light.badrum_overvaning_spotlights

                      - action: scene.turn_on
                        target:
                          entity_id: scene.badrum_overvaning_nattlampa_2
                        data:
                          transition: 3

                # ---------------------------------------------------
                # Normalt läge: bare light.turn_on, så Adaptive Lighting
                # får adaptera som vanligt.
                # ---------------------------------------------------
                default:
                  - action: light.turn_on
                    target:
                      entity_id: light.badrum_overvaning_spotlights

        # ===========================================================
        # SLÄCK NÄR INGEN ÄR KVAR
        # ===========================================================
        default:
          - condition: state
            entity_id: binary_sensor.badrum_overvaning_presence
            state: "off"

          - action: light.turn_off
            target:
              entity_id: light.badrum_overvaning_spotlights