# Board: WAVESHARE ESP32-S3-ETH-8DI-8DO
# Definition: definitions/boards/waveshare_esp32_s3_eth_8di_8do/manifest.yaml

esphome:
  name: regnlogger-nimbus
  friendly_name: Regnlogger_nimbus

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret regnlogger_nimbus_api_encryption_key

ota:
  - platform: esphome

ethernet:
  clk_pin: GPIO15
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  miso_pin: GPIO14
  mosi_pin: GPIO13
  type: W5500